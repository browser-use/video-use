name: Benchmark
on: [push]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[animations]"
      - run: echo "Benchmark: video-use import time" && python -c "import time; s=time.time(); import video_use; print(f'Import: {time.time()-s:.3f}s')"
